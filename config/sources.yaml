# 大宗資材價格資料來源登錄檔
# 新增/調整資料集只需改這裡，不需改動程式碼。

host: "https://pcic.pcc.gov.tw/pwc-web/api/service/opendata-file/document/"

# 該政府主機憑證缺 Subject Key Identifier，新版 OpenSSL 的鏈驗證會拒絕（SSLCertVerificationError）。
# 為避免盲目停用 TLS 驗證（MITM 風險），改採「憑證指紋釘選」：仍驗證對方確為該伺服器，
# 只是繞過壞掉的鏈驗證。憑證輪替時需更新此指紋（TWCA 簽發，現效期至 2027-02-11）。
# 取得方式：見 README「更新憑證指紋」。
tls_pin_sha256: "de0ee3b5442bbdb71a4aa264190608ce406a3fe8dedfc9e1bae95ff31add0496"

# ── PDF 來源（tec0404「大宗資材價格」各類趨勢 PDF）─────────────────────────
# 自 2026-07 起改用此來源（開放資料落後兩三個月，見記憶 opendata-source-shelved）。
# 背後為未設限 JSON API：一次 GET 取完整目錄、再依每檔 fileNo 以 POST 下載。
# 主機同上（pcic.pcc.gov.tw），沿用同一組憑證指紋釘選。
pdf_api:
  list_path: "/pwc-web/api/service/adm-files/findAdmFilesByBlackList/TEC"
  download_path: "/pwc-web/api/service/adm-files/downloadFile"
  business_type: "TEC_MATERIAL_PRICE"   # 目錄中屬「大宗資材價格」的檔案

# 要下載並解析進模型的 6 條個別價格趨勢（依 fileNameOri 前綴比對）。
# layout = 解析器版面家族：steel_wide(北中南) / steel_national(不分區) /
#          county_range(縣市區間) / region_stat(分區統計長表)。
pdf_series:
  - material: 鋼筋
    name_prefix: "鋼筋價格趨勢"
    layout: steel_wide
  - material: H型鋼
    name_prefix: "H型鋼價格趨勢"
    layout: steel_wide
  - material: 鋼板
    name_prefix: "鋼板價格趨勢"
    layout: steel_national
  - material: 砂石
    name_prefix: "砂石價格趨勢"
    layout: county_range
  - material: 預拌混凝土
    name_prefix: "預拌混凝土價格趨勢"
    layout: region_stat
  - material: 瀝青混凝土
    name_prefix: "瀝青混凝土價格趨勢"
    layout: region_stat

# ── 開放資料集登錄（已停用為即時源；保留供未來需要時重啟）────────────────
# 2026-07 起不再使用（資料落後）。詳見記憶 opendata-source-shelved。
datasets:
  - name: 鋼筋
    material: 鋼筋
    dataset_id: 6820
    file: "鋼筋.csv"
    family: wide_region
  - name: H型鋼
    material: H型鋼
    dataset_id: 6577
    file: "H型鋼.csv"
    family: wide_region
  - name: 鋼板
    material: 鋼板
    dataset_id: 6578
    file: "鋼板.csv"
    family: wide_region
  - name: 砂石
    material: 砂石
    dataset_id: 6818
    file: "砂石.csv"
    family: county_range
  - name: 預拌混凝土
    material: 預拌混凝土
    dataset_id: 6819
    file: "預拌混凝土.csv"
    family: region_stat
  - name: 瀝青混凝土
    material: 瀝青混凝土
    dataset_id: 6579
    file: "瀝青混凝土.csv"
    family: region_stat
  - name: 大宗資材及其漲跌幅彙整表
    material: 彙整表
    dataset_id: 7374
    file: "大宗資材及其漲跌幅彙整表.csv"
    family: summary

# 地區標籤 -> 北中南東/全國 彙總群組
region_group:
  北區: 北
  中區: 中
  南區: 南
  花蓮: 東
  台東: 東
  北: 北
  中: 中
  南: 南
  花: 東
  東: 東
  不分區: 全國

# 地區標籤 -> 粒度層級（region=三區/東部；national=不分區；county=縣市）
region_level:
  北區: region
  中區: region
  南區: region
  花蓮: region
  台東: region
  北: region
  中: region
  南: region
  花: region
  東: region
  不分區: national

