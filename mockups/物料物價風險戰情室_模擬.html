<title>大宗物料物價風險戰情室 — 版面模擬</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  color-scheme: light;
  --plane:#eaeef3; --surface:#ffffff; --sunken:#f4f6f9; --raised:#ffffff;
  --ink:#101620; --ink2:#5a6472; --muted:#8a93a0;
  --line:#e3e7ec; --hair:rgba(16,22,32,.08); --baseline:#c7ccd3;
  --accent:#2f4b8f; --accent-soft:#e8edf7;
  --rise:#d03b3b; --rise-soft:#fbeaea; --warn:#c8860a; --warn-soft:#fcf3e2; --fall:#0f8a3c; --fall-soft:#e7f4ec;
  --m-steel:#2a78d6; --m-hbeam:#c85f89; --m-plate:#1baf7a; --m-concrete:#008300; --m-asphalt:#c07f00; --m-sand:#4a3aa7;
  --shadow:0 1px 2px rgba(16,22,32,.06),0 4px 16px rgba(16,22,32,.05);
  --r:14px;
}
@media (prefers-color-scheme:dark){:root:where(:not([data-theme="light"])){
  color-scheme:dark;
  --plane:#0c0f14; --surface:#161b22; --sunken:#1b212b; --raised:#1c232e;
  --ink:#eef2f7; --ink2:#aab4c1; --muted:#7b8592;
  --line:#262d38; --hair:rgba(255,255,255,.09); --baseline:#3a424e;
  --accent:#7a99e6; --accent-soft:#1e2740;
  --rise:#f0605f; --rise-soft:#331a1c; --warn:#f0b23a; --warn-soft:#2e2411; --fall:#3fc06a; --fall-soft:#122a1b;
  --m-steel:#3987e5; --m-hbeam:#d55181; --m-plate:#199e70; --m-concrete:#4fae4f; --m-asphalt:#d99f2e; --m-sand:#9085e9;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 6px 20px rgba(0,0,0,.35);
}}
:root[data-theme="dark"]{
  color-scheme:dark;
  --plane:#0c0f14; --surface:#161b22; --sunken:#1b212b; --raised:#1c232e;
  --ink:#eef2f7; --ink2:#aab4c1; --muted:#7b8592;
  --line:#262d38; --hair:rgba(255,255,255,.09); --baseline:#3a424e;
  --accent:#7a99e6; --accent-soft:#1e2740;
  --rise:#f0605f; --rise-soft:#331a1c; --warn:#f0b23a; --warn-soft:#2e2411; --fall:#3fc06a; --fall-soft:#122a1b;
  --m-steel:#3987e5; --m-hbeam:#d55181; --m-plate:#199e70; --m-concrete:#4fae4f; --m-asphalt:#d99f2e; --m-sand:#9085e9;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 6px 20px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
body{margin:0;background:var(--plane);color:var(--ink);
  font-family:system-ui,-apple-system,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
.num{font-variant-numeric:tabular-nums;}
h1,h2,h3{margin:0;font-weight:650;letter-spacing:-.01em;}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--muted);}

/* ---- header ---- */
header{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--surface) 88%,transparent);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
.bar{max-width:1200px;margin:0 auto;padding:11px 20px;display:flex;align-items:center;gap:18px;}
.brand{display:flex;align-items:center;gap:11px;}
.logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 55%,#111));
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:17px;box-shadow:var(--shadow);}
.brand b{font-size:15.5px;font-weight:700;letter-spacing:-.02em;}
.brand span{display:block;font-size:11px;color:var(--muted);letter-spacing:.02em;}
nav{display:flex;gap:3px;margin-left:6px;background:var(--sunken);padding:4px;border-radius:11px;}
nav button{font:inherit;font-size:13.5px;font-weight:600;border:0;background:transparent;color:var(--ink2);
  padding:7px 14px;border-radius:8px;cursor:pointer;white-space:nowrap;transition:.15s;}
nav button:hover{color:var(--ink);}
nav button[aria-selected="true"]{background:var(--surface);color:var(--accent);box-shadow:var(--shadow);}
.spacer{flex:1}
.asof{font-size:12px;color:var(--ink2);text-align:right;line-height:1.35;}
.asof b{color:var(--ink);font-weight:700}
.tbtn{font:inherit;font-size:13px;border:1px solid var(--line);background:var(--surface);color:var(--ink2);
  width:34px;height:34px;border-radius:9px;cursor:pointer;}
.tbtn:hover{color:var(--ink);border-color:var(--baseline)}

main{max-width:1200px;margin:0 auto;padding:22px 20px 60px;}
.panel{display:none}.panel.on{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);}
.pad{padding:16px 18px}
.grid{display:grid;gap:16px}
.chead{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:2px}
.chead h3{font-size:15px}
.chead .sub{font-size:12px;color:var(--muted)}

/* ---- risk banner ---- */
.banner{display:flex;align-items:center;gap:18px;padding:18px 20px;border-radius:var(--r);
  background:linear-gradient(100deg,var(--rise-soft),color-mix(in srgb,var(--rise-soft) 40%,var(--surface)));
  border:1px solid color-mix(in srgb,var(--rise) 32%,var(--line));box-shadow:var(--shadow);}
.banner .dot{flex:none;width:46px;height:46px;border-radius:12px;background:var(--rise);color:#fff;
  display:grid;place-items:center;font-size:24px;box-shadow:0 4px 14px color-mix(in srgb,var(--rise) 40%,transparent)}
.banner h2{font-size:18px}
.banner p{margin:3px 0 0;color:var(--ink2);font-size:13px}
.banner .big{margin-left:auto;text-align:right}
.banner .big .n{font-size:30px;font-weight:750;color:var(--rise);letter-spacing:-.02em}
.banner .big .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}

/* ---- pressure cards ---- */
.cards{grid-template-columns:repeat(6,1fr)}
@media(max-width:1080px){.cards{grid-template-columns:repeat(3,1fr)}}
@media(max-width:640px){.cards{grid-template-columns:repeat(2,1fr)}}
.mcard{position:relative;overflow:hidden}
.mcard .top{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.swatch{width:10px;height:10px;border-radius:3px;flex:none}
.mcard .name{font-size:13px;font-weight:650}
.mcard .price{font-size:22px;font-weight:730;letter-spacing:-.02em;line-height:1.1}
.mcard .unit{font-size:11px;color:var(--muted);font-weight:500}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11.5px;font-weight:700;
  padding:2px 7px;border-radius:20px;line-height:1.4}
.badge.up{background:var(--rise-soft);color:var(--rise)}
.badge.dn{background:var(--fall-soft);color:var(--fall)}
.badge.fl{background:var(--sunken);color:var(--ink2)}
.spark{margin-top:10px;height:38px;width:100%}
.mcard .foot{display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--muted)}

/* chips / toggles */
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{font:inherit;font-size:12.5px;font-weight:600;border:1px solid var(--line);background:var(--surface);
  color:var(--ink2);padding:5px 12px;border-radius:20px;cursor:pointer;transition:.12s}
.chip:hover{border-color:var(--baseline);color:var(--ink)}
.chip[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:#fff}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:2px}
.lg{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink2);cursor:pointer;user-select:none}
.lg .swatch{width:12px;height:3px;border-radius:2px}
.lg.off{opacity:.35}

svg.chart{display:block;width:100%;height:auto;overflow:visible}
.axis{fill:var(--muted);font-size:10.5px}
.gridln{stroke:var(--line);stroke-width:1}
.baseln{stroke:var(--baseline);stroke-width:1}
.zero{stroke:var(--baseline);stroke-width:1.5;stroke-dasharray:2 3}
.lbl{font-size:11px;font-weight:700}
.tip{position:absolute;pointer-events:none;z-index:40;background:var(--raised);border:1px solid var(--line);
  border-radius:10px;box-shadow:var(--shadow);padding:9px 11px;font-size:12px;min-width:150px;opacity:0;transition:opacity .1s}
.tip .th{font-weight:700;margin-bottom:5px;font-size:11.5px;color:var(--ink2)}
.tip .tr{display:flex;align-items:center;gap:7px;justify-content:space-between;margin:2px 0}
.tip .tr .k{display:flex;align-items:center;gap:6px;color:var(--ink2)}
.tip .tr .v{font-weight:700;font-variant-numeric:tabular-nums}
.tip .sw{width:9px;height:9px;border-radius:3px;flex:none}

/* movers */
.movers{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.movers{grid-template-columns:1fr}}
.mv h4{font-size:12px;margin:0 0 8px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.mvrow{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--line)}
.mvrow .nm{font-weight:600;font-size:13px}
.mvrow .bar{flex:1;height:7px;border-radius:4px;background:var(--sunken);overflow:hidden}
.mvrow .bar i{display:block;height:100%;border-radius:4px}
.mvrow .pct{font-weight:750;font-size:13px;width:58px;text-align:right;font-variant-numeric:tabular-nums}

/* ---- tab2 recost ---- */
.recost{display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start}
@media(max-width:900px){.recost{grid-template-columns:1fr}}
.proj{display:flex;flex-direction:column;gap:8px}
.projbtn{text-align:left;font:inherit;border:1px solid var(--line);background:var(--surface);border-radius:11px;
  padding:11px 13px;cursor:pointer;transition:.12s}
.projbtn:hover{border-color:var(--baseline)}
.projbtn[aria-pressed="true"]{border-color:var(--accent);background:var(--accent-soft);box-shadow:var(--shadow)}
.projbtn .pn{font-weight:660;font-size:13.5px}
.projbtn .pm{font-size:11.5px;color:var(--muted);margin-top:2px;display:flex;gap:8px}
.pill{font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:20px;background:var(--sunken);color:var(--ink2)}
.basket{margin-top:4px}
.basket table{width:100%;border-collapse:collapse}
.basket th{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;text-align:right;font-weight:700;padding:0 0 6px}
.basket th:first-child{text-align:left}
.basket td{padding:6px 0;border-top:1px solid var(--line);font-size:13px;vertical-align:middle}
.basket td.r{text-align:right;font-variant-numeric:tabular-nums}
.basket .mm{display:flex;align-items:center;gap:7px;font-weight:600}
.basket input{width:78px;font:inherit;font-size:13px;text-align:right;font-variant-numeric:tabular-nums;
  border:1px solid var(--line);background:var(--sunken);color:var(--ink);border-radius:7px;padding:4px 7px}
.basket input:focus{outline:2px solid var(--accent);border-color:transparent}
.datesel{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:12.5px;color:var(--ink2)}
.datesel select{font:inherit;font-size:12.5px;border:1px solid var(--line);background:var(--surface);color:var(--ink);
  border-radius:8px;padding:5px 8px}

.stat3{display:grid;grid-template-columns:1fr 1fr 1.15fr;gap:1px;background:var(--line);border-radius:var(--r);overflow:hidden}
@media(max-width:560px){.stat3{grid-template-columns:1fr}}
.st{background:var(--surface);padding:15px 17px}
.st .l{font-size:11.5px;color:var(--muted);font-weight:600}
.st .v{font-size:26px;font-weight:740;letter-spacing:-.02em;margin-top:3px;font-variant-numeric:tabular-nums}
.st .s{font-size:11.5px;color:var(--ink2);margin-top:2px}
.st.hl{background:linear-gradient(120deg,var(--rise-soft),color-mix(in srgb,var(--rise-soft) 30%,var(--surface)))}
.st.hl .v{color:var(--rise)}
.st.hlg{background:linear-gradient(120deg,var(--fall-soft),color-mix(in srgb,var(--fall-soft) 30%,var(--surface)))}
.st.hlg .v{color:var(--fall)}

.reco{display:flex;align-items:center;gap:16px;padding:16px 18px;border-radius:var(--r);
  background:linear-gradient(100deg,var(--accent-soft),color-mix(in srgb,var(--accent-soft) 30%,var(--surface)));
  border:1px solid color-mix(in srgb,var(--accent) 26%,var(--line))}
.reco .ic{width:42px;height:42px;flex:none;border-radius:11px;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:21px}
.reco .rv{margin-left:auto;text-align:right}
.reco .rv .n{font-size:27px;font-weight:750;color:var(--accent);letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.reco .rv .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.reco h4{font-size:14.5px;margin:0}
.reco p{margin:3px 0 0;font-size:12.5px;color:var(--ink2);max-width:52ch}

/* tab3 */
.detail-head{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.regbars{display:flex;flex-direction:column;gap:9px;margin-top:4px}
.rb{display:grid;grid-template-columns:42px 1fr 84px;align-items:center;gap:10px}
.rb .rn{font-size:12.5px;color:var(--ink2);font-weight:600}
.rb .rt{height:22px;border-radius:6px;background:var(--sunken);overflow:hidden;position:relative}
.rb .rt i{display:block;height:100%;border-radius:6px}
.rb .rv{font-size:13px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.mini{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border-radius:11px;overflow:hidden;margin-top:2px}
.mini .m{background:var(--surface);padding:11px 13px}
.mini .m .l{font-size:11px;color:var(--muted)}
.mini .m .v{font-size:17px;font-weight:720;margin-top:2px;font-variant-numeric:tabular-nums}
.foot-note{color:var(--muted);font-size:11.5px;margin-top:10px;line-height:1.6}
.tablewrap{overflow-x:auto;margin-top:10px}
table.data{width:100%;border-collapse:collapse;font-size:12.5px}
table.data th,table.data td{padding:6px 10px;text-align:right;font-variant-numeric:tabular-nums;border-bottom:1px solid var(--line)}
table.data th:first-child,table.data td:first-child{text-align:left}
table.data th{color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.linktog{font:inherit;font-size:12px;color:var(--accent);background:none;border:0;cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:2px}
</style>

<header>
  <div class="bar">
    <div class="brand">
      <div class="logo">物</div>
      <div><b>大宗物料物價風險戰情室</b><span>公共工程材料 · 監看漲勢 × 工程重估</span></div>
    </div>
    <nav id="tabs">
      <button aria-selected="true" data-tab="watch">物價戰情</button>
      <button aria-selected="false" data-tab="recost">工程重估</button>
      <button aria-selected="false" data-tab="detail">品項深掘</button>
    </nav>
    <div class="spacer"></div>
    <div class="asof">資料截至 <b id="asof">—</b><br>來源：工程會價格趨勢</div>
    <button class="tbtn" id="theme" title="切換深/淺色">◐</button>
  </div>
</header>

<main>
  <!-- ============ TAB 1 WATCH ============ -->
  <section class="panel on" id="watch">
    <div id="banner"></div>
    <div class="grid cards" id="pcards" style="margin-top:16px"></div>

    <div class="card pad" style="margin-top:16px">
      <div class="chead">
        <div><h3>物料漲跌幅比較</h3><div class="sub" id="cmpSub">相對基準月的累積漲跌（%）— 不同單價品項可同軸比較</div></div>
        <div class="chips" id="rangeChips">
          <button class="chip" data-r="12">近1年</button>
          <button class="chip" aria-pressed="true" data-r="36">近3年</button>
          <button class="chip" data-r="999">全期</button>
          <button class="linktog" id="tblTog" style="margin-left:6px">資料表</button>
        </div>
      </div>
      <div class="legend" id="cmpLegend"></div>
      <div style="position:relative"><div id="cmpChart"></div></div>
      <div id="cmpTable" style="display:none"></div>
    </div>

    <div class="card pad" style="margin-top:16px">
      <div class="chead"><div><h3>誰在漲、誰在跌</h3><div class="sub">近一年變化（YoY），依幅度排序</div></div></div>
      <div id="movers" style="position:relative"></div>
    </div>
  </section>

  <!-- ============ TAB 2 RECOST ============ -->
  <section class="panel" id="recost">
    <div class="recost">
      <div>
        <div class="card pad">
          <div class="eyebrow">選擇工程</div>
          <div class="proj" id="projList" style="margin-top:10px"></div>
        </div>
        <div class="card pad" style="margin-top:16px">
          <div class="eyebrow">用料清單（可調整）</div>
          <div class="basket" id="basket" style="margin-top:8px"></div>
          <div class="datesel">原始編列時間
            <select id="origDate"></select>
          </div>
          <div class="foot-note">數量為材料用量（噸 / 立方公尺）。此處試算<b>材料成本</b>，不含工資與其他費用。</div>
        </div>
      </div>
      <div>
        <div class="stat3" id="stat3"></div>
        <div class="card pad" style="margin-top:16px">
          <div class="chead"><div><h3>漲價來自哪些材料</h3><div class="sub">各材料造成的成本增減（今日 vs 原始編列）</div></div></div>
          <div style="position:relative"><div id="waterfall"></div></div>
        </div>
        <div class="card pad" style="margin-top:16px">
          <div class="chead"><div><h3>同一份用料，成本如何隨物價變動</h3><div class="sub">以此工程用量，回推每月材料總成本</div></div></div>
          <div style="position:relative"><div id="basketChart"></div></div>
        </div>
        <div class="reco" id="reco" style="margin-top:16px"></div>
      </div>
    </div>
  </section>

  <!-- ============ TAB 3 DETAIL ============ -->
  <section class="panel" id="detail">
    <div class="detail-head">
      <span class="eyebrow" style="margin-right:4px">選擇品項</span>
      <div class="chips" id="matChips"></div>
    </div>
    <div class="grid" style="grid-template-columns:1.55fr 1fr;gap:16px" id="detailGrid">
      <div class="card pad">
        <div class="chead"><div><h3 id="dTitle">—</h3><div class="sub" id="dSub">實際單價走勢</div></div>
          <div class="chips" id="dRange">
            <button class="chip" data-r="12">近1年</button>
            <button class="chip" data-r="36">近3年</button>
            <button class="chip" aria-pressed="true" data-r="999">全期</button>
          </div>
        </div>
        <div style="position:relative"><div id="dChart"></div></div>
        <div class="mini" id="dStats"></div>
      </div>
      <div class="card pad">
        <div class="chead"><div><h3>最新區域價</h3><div class="sub" id="dRegSub">各區成交價</div></div></div>
        <div id="dReg" style="position:relative"></div>
        <div class="foot-note" id="dRegNote"></div>
      </div>
    </div>
  </section>
</main>

    let i=Math.round((px-PL)/((W-PL-PR)/(n-1)));i=Math.max(0,Math.min(n-1,i));
    cl.setAttribute("x1",X(i));cl.setAttribute("x2",X(i));cl.setAttribute("opacity",1);
    let rows="";series.forEach((s,k)=>{const p=s.pts[i];if(s.hidden||p.y==null){dots[k].setAttribute("opacity",0);return;}
      dots[k].setAttribute("cx",X(i));dots[k].setAttribute("cy",Y(p.y));dots[k].setAttribute("opacity",1);
      rows+=`<div class="tr"><span class="k"><span class="sw" style="background:${s.color}"></span>${s.label}</span><span class="v">${s.vfmt(p.y)}</span></div>`;});
    tip.innerHTML=`<div class="th">民國 ${rocLabel(series[0].pts[i].p)}</div>${rows}`;
    tip.style.opacity=1;const tx=ev.clientX+14,ty=ev.clientY-10;
    tip.style.left=Math.min(tx,window.innerWidth-tip.offsetWidth-12)+"px";tip.style.top=ty+"px";
  }
  hit.addEventListener("mousemove",move);
  hit.addEventListener("mouseleave",()=>{tip.style.opacity=0;cl.setAttribute("opacity",0);dots.forEach(d=>d.setAttribute("opacity",0));});
  mount.innerHTML="";mount.appendChild(svg);
}

function sparkline(mount,pts,color){
  const W=180,H=38,ns="http://www.w3.org/2000/svg";const vs=pts.map(p=>p.v);
  const mn=Math.min(...vs),mx=Math.max(...vs);const X=i=>(W)*(i/(pts.length-1));const Y=v=>4+(H-8)*(1-(v-mn)/((mx-mn)||1));
  const mk=(t,a)=>{const e=document.createElementNS(ns,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
  const svg=document.createElementNS(ns,"svg");svg.setAttribute("class","spark");svg.setAttribute("viewBox",`0 0 ${W} ${H}`);svg.setAttribute("preserveAspectRatio","none");
  let d="",a="";pts.forEach((p,i)=>{d+=(i?"L":"M")+X(i)+" "+Y(p.v);});a=d+`L${W} ${H}L0 ${H}Z`;
  const gid="g"+Math.random().toString(36).slice(2,7);
  const defs=mk("defs",{});const lg=mk("linearGradient",{id:gid,x1:0,y1:0,x2:0,y2:1});
  lg.appendChild(mk("stop",{offset:0,"stop-color":color,"stop-opacity":.22}));lg.appendChild(mk("stop",{offset:1,"stop-color":color,"stop-opacity":0}));
  defs.appendChild(lg);svg.appendChild(defs);
  svg.appendChild(mk("path",{d:a,fill:`url(#${gid})`,stroke:"none"}));
  svg.appendChild(mk("path",{d,fill:"none",stroke:color,"stroke-width":2,"stroke-linejoin":"round"}));
  svg.appendChild(mk("circle",{cx:X(pts.length-1),cy:Y(vs[vs.length-1]),r:2.6,fill:color}));
  mount.innerHTML="";mount.appendChild(svg);
}

const badge=(pct,long)=>{if(pct==null)return"";const up=pct>0.15,dn=pct<-0.15;

  return `<span class="badge ${cls}">${ar} ${pct>0?"+":""}${pct.toFixed(1)}%</span>`;};

  h+="</tbody></table></div>";tb.innerHTML=h;

/* generic vertical column chart — magnitude (from 0) or diverging (± around zero) */
function columnChart(mount,{items,mode="magnitude",height=230,width=440}){
  const W=width,H=height,PL=16,PR=16,PT=26,PB=48,ns="http://www.w3.org/2000/svg";
  const vals=items.map(d=>d.value);
  let mx,mn;
  if(mode==="diverging"){const a=(Math.max(...vals.map(v=>Math.abs(v)))||1)*1.3;mx=a;mn=-a;}
  else{mx=(Math.max(...vals)||1)*1.16;mn=0;}
  const Y=v=>PT+(H-PT-PB)*(1-(v-mn)/(mx-mn));
  const n=items.length,step=(W-PL-PR)/n,bw=Math.min(step*0.46,54);
  const mk=(t,a,txt)=>{const e=document.createElementNS(ns,t);for(const k in a)e.setAttribute(k,a[k]);if(txt!=null)e.textContent=txt;return e;};
  const svg=document.createElementNS(ns,"svg");svg.setAttribute("class","chart");svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  const zy=Y(0);
  svg.appendChild(mk("line",{x1:PL,y1:zy,x2:W-PR,y2:zy,class:mode==="diverging"?"zero":"baseln"}));
  items.forEach((d,i)=>{
    const cx=PL+step*i+step/2,up=d.value>=0,y1=Y(d.value),top=Math.min(zy,y1),h=Math.max(Math.abs(y1-zy),2);
    const r=mk("rect",{x:cx-bw/2,y:top,width:bw,height:h,rx:4,fill:d.barColor});
    r.appendChild(mk("title",{},d.label+"："+d.vlabel));svg.appendChild(r);
    svg.appendChild(mk("text",{x:cx,y:up?top-7:top+h+16,class:"lbl",fill:d.barColor,"text-anchor":"middle"},d.vlabel));
    if(d.swatch)svg.appendChild(mk("rect",{x:cx-4.5,y:H-35,width:9,height:9,rx:2,fill:d.swatch}));
    svg.appendChild(mk("text",{x:cx,y:H-16,class:"axis","text-anchor":"middle"},d.label));
  });
  mount.innerHTML="";mount.appendChild(svg);
}
function renderMovers(){

function costAt(basket,p){let t=0;for(const m in basket)t+=basket[m]*priceAt(m,p);return t;}
function computeRecost(){
  const b=curProj.basket;const orig=costAt(b,origDate),now=costAt(b,LATEST);const d=now-orig,pct=orig?d/orig*100:0;
  const up=d>=0;
  document.getElementById("stat3").innerHTML=`
    <div class="st"><div class="l">原始編列材料成本</div><div class="v">${fmtWan(orig)}</div><div class="s">民國${rocLabel(origDate)} 物價</div></div>
    <div class="st"><div class="l">以今日物價重估</div><div class="v">${fmtWan(now)}</div><div class="s">民國${rocLabel(LATEST)} 物價</div></div>
    <div class="st ${up?'hl':'hlg'}"><div class="l">差額</div><div class="v">${up?"+":"−"}${fmtWan(Math.abs(d))}</div><div class="s">${up?"↑ 需追加 ":"↓ 可節省 "}${up?"+":""}${pct.toFixed(1)}%</div></div>`;
  // waterfall
  const parts=Object.keys(b).map(m=>({m,d:b[m]*(priceAt(m,LATEST)-priceAt(m,origDate))})).sort((a,z)=>Math.abs(z.d)-Math.abs(a.d));
  waterfall(document.getElementById("waterfall"),parts,d);
  // basket over time
  const arr=S("鋼筋");const seg=arr.slice(-Math.min(arr.length, (999)));
  const series=[{label:"材料總成本",color:css("--accent"),vfmt:v=>fmtWan(v)+"元",
    pts:S("鋼筋").map(x=>({p:x.p,y:costAt(b,x.p)}))}];
  lineChart(document.getElementById("basketChart"),{series,mode:"abs",height:230,yfmt:v=>fmtWan(v)});
  // reco
  const buf=8;const rec=now*(1+buf/100);
  document.getElementById("reco").innerHTML=`<div class="ic">✎</div>
    <div><h4>規劃中類似工程 · 建議材料預算</h4>
      <p>以今日物價重估 ${fmtWan(now)}元，加計完工前物價緩衝 ${buf}%（過去一年多數材料仍在漲）。實際編列請再依工程規模與工期調整。</p></div>
    <div class="rv"><div class="n">${fmtWan(rec)}</div><div class="l">建議編列（含緩衝）</div></div>`;
}
function waterfall(mount,parts,total){
  const W=760,H=210,PL=52,PR=18,PT=10,PB=40,ns="http://www.w3.org/2000/svg";
  const vals=parts.map(p=>p.d);const mx=Math.max(0,...vals),mn=Math.min(0,...vals);const pad=(mx-mn)*0.12||1;
  const hi=mx+pad,lo=mn-pad;const Y=v=>PT+(H-PT-PB)*(1-(v-lo)/(hi-lo));
  const bw=(W-PL-PR)/parts.length*0.56;const step=(W-PL-PR)/parts.length;
  const mk=(t,a,txt)=>{const e=document.createElementNS(ns,t);for(const k in a)e.setAttribute(k,a[k]);if(txt!=null)e.textContent=txt;return e;};
  const svg=document.createElementNS(ns,"svg");svg.setAttribute("class","chart");svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  svg.appendChild(mk("line",{x1:PL,y1:Y(0),x2:W-PR,y2:Y(0),class:"baseln"}));
  const t0=mk("text",{x:PL-8,y:Y(0)+3,class:"axis","text-anchor":"end"},"0");svg.appendChild(t0);
  parts.forEach((p,i)=>{const cx=PL+step*i+step/2;const up=p.d>=0;const c=up?"var(--rise)":"var(--fall)";
    const y0=Y(0),y1=Y(p.d);const top=Math.min(y0,y1),h=Math.abs(y1-y0);
    svg.appendChild(mk("rect",{x:cx-bw/2,y:top,width:bw,height:Math.max(h,1),rx:4,fill:c,opacity:.92}));
    svg.appendChild(mk("text",{x:cx,y:up?top-6:top+h+15,class:"lbl",fill:c,"text-anchor":"middle"},(up?"+":"−")+fmtWan(Math.abs(p.d))));
    svg.appendChild(mk("text",{x:cx,y:H-22,class:"axis","text-anchor":"middle"},p.m));
    svg.appendChild(mk("circle",{cx:cx-bw/2-11,cy:H-25.5,r:4,fill:colOf(p.m)}));
  });
  mount.innerHTML="";mount.appendChild(svg);
}
