<title>大宗物料物價風險戰情室 — 版面模擬</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  color-scheme: light;
  --plane:#c9d0da; --surface:#ffffff; --sunken:#f4f6f9; --raised:#ffffff;
  --ink:#101620; --ink2:#5a6472; --muted:#8a93a0;
  --line:#e3e7ec; --hair:rgba(16,22,32,.08); --baseline:#c7ccd3;
  --accent:#2f4b8f; --accent-soft:#e8edf7;
  --rise:#d03b3b; --rise-soft:#fbeaea; --warn:#c8860a; --warn-soft:#fcf3e2; --fall:#0f8a3c; --fall-soft:#e7f4ec;
  --m-steel:#2a78d6; --m-hbeam:#c85f89; --m-plate:#1baf7a; --m-concrete:#008300;
  --shadow:0 1px 2px rgba(16,22,32,.06),0 4px 16px rgba(16,22,32,.05);
  --r:13px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--plane);overflow:hidden;
  font-family:system-ui,-apple-system,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;}
body{display:flex;align-items:center;justify-content:center;color:var(--ink);font-size:13px;line-height:1.45;-webkit-font-smoothing:antialiased;}
.num{font-variant-numeric:tabular-nums;}
h1,h2,h3{margin:0;font-weight:650;letter-spacing:-.01em;}
.eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--muted);}

/* ===== 固定畫布 1280×720（G-1）===== */
#stage{width:1280px;height:720px;background:var(--plane);transform-origin:center center;
  display:flex;flex-direction:column;overflow:hidden;position:relative;box-shadow:0 10px 50px rgba(0,0,0,.3);}

/* ---- header（高度計入畫布 G-3）---- */
header{flex:none;height:52px;background:var(--surface);border-bottom:1px solid var(--line);}
.bar{height:100%;padding:0 22px;display:flex;align-items:center;gap:16px;}
.brand{display:flex;align-items:center;gap:10px;}
.logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 55%,#111));
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:15px;}
.brand b{font-size:14.5px;font-weight:700;letter-spacing:-.02em;}
.brand span{display:block;font-size:10.5px;color:var(--muted);}
nav{display:flex;gap:3px;margin-left:4px;background:var(--sunken);padding:3px;border-radius:10px;}
nav button{font:inherit;font-size:13px;font-weight:600;border:0;background:transparent;color:var(--ink2);padding:6px 13px;border-radius:7px;cursor:pointer;white-space:nowrap;transition:.15s;}
nav button:hover{color:var(--ink);}
nav button[aria-selected="true"]{background:var(--surface);color:var(--accent);box-shadow:var(--shadow);}
.spacer{flex:1}
.asof{font-size:11px;color:var(--ink2);text-align:right;line-height:1.3;}
.asof b{color:var(--ink);font-weight:700}

main{flex:1;min-height:0;padding:14px 22px;position:relative;}
.panel{display:none;height:100%;}.panel.on{display:block;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);}
.pad{padding:13px 15px}
.chead{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:4px}
.chead h3{font-size:14px}
.chead .sub{font-size:11px;color:var(--muted)}

/* ---- 物價戰情 ---- */
#watch.on{display:flex;flex-direction:column;gap:12px;}
.banner{display:flex;align-items:center;gap:15px;padding:12px 16px;border-radius:var(--r);
  background:linear-gradient(100deg,var(--rise-soft),color-mix(in srgb,var(--rise-soft) 40%,var(--surface)));
  border:1px solid color-mix(in srgb,var(--rise) 32%,var(--line));flex:none;}
.banner .dot{flex:none;width:38px;height:38px;border-radius:10px;background:var(--rise);color:#fff;display:grid;place-items:center;font-size:20px;}
.banner h2{font-size:16px}
.banner p{margin:2px 0 0;color:var(--ink2);font-size:12px}
.banner .big{margin-left:auto;text-align:right}
.banner .big .n{font-size:26px;font-weight:750;color:var(--rise);letter-spacing:-.02em}
.banner .big .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;flex:none}
.mcard .top{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.swatch{width:10px;height:10px;border-radius:3px;flex:none}
.mcard .name{font-size:12.5px;font-weight:650}
.mcard .price{font-size:21px;font-weight:730;letter-spacing:-.02em;line-height:1.1}
.mcard .unit{font-size:10.5px;color:var(--muted);font-weight:500}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px;line-height:1.4}
.badge.up{background:var(--rise-soft);color:var(--rise)} .badge.dn{background:var(--fall-soft);color:var(--fall)} .badge.fl{background:var(--sunken);color:var(--ink2)}
.spark{margin-top:8px;height:34px;width:100%}
.mcard .foot{display:flex;justify-content:space-between;margin-top:6px;font-size:10.5px;color:var(--muted)}
.mcard{cursor:pointer;transition:box-shadow .15s}
.mcard:hover{box-shadow:0 2px 6px rgba(16,22,32,.1),0 8px 24px rgba(16,22,32,.1)}
.mcard .drill{margin-left:auto;font-size:10px;font-weight:700;color:var(--accent)}
.watch-bottom{display:grid;grid-template-columns:1.55fr 1fr;gap:12px}
.watch-bottom .card{display:flex;flex-direction:column;min-height:0}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin:2px 0 4px}
.lg{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink2);cursor:pointer;user-select:none}
.lg .swatch{width:12px;height:3px;border-radius:2px} .lg.off{opacity:.35}
.chartbox{position:relative}

svg.chart{display:block;width:100%;height:auto;overflow:visible}
.axis{fill:var(--muted);font-size:10px}
.gridln{stroke:var(--line);stroke-width:1} .baseln{stroke:var(--baseline);stroke-width:1}
.zero{stroke:var(--baseline);stroke-width:1.5;stroke-dasharray:2 3}
.lbl{font-size:10.5px;font-weight:700}
.tip{position:fixed;pointer-events:none;z-index:60;background:var(--raised);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:8px 10px;font-size:11.5px;min-width:140px;opacity:0;transition:opacity .1s}
.tip .th{font-weight:700;margin-bottom:4px;font-size:11px;color:var(--ink2)}
.tip .tr{display:flex;align-items:center;gap:7px;justify-content:space-between;margin:2px 0}
.tip .tr .k{display:flex;align-items:center;gap:6px;color:var(--ink2)}
.tip .tr .v{font-weight:700;font-variant-numeric:tabular-nums}
.tip .sw{width:9px;height:9px;border-radius:3px;flex:none}
.tip .tsep{height:1px;background:var(--line);margin:6px 0}
.tip .tsub{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.tip .tnote{font-size:10px;color:var(--muted);margin-top:5px;line-height:1.4}

/* movers 說明 */
.mv-note{font-size:10.5px;color:var(--muted);margin-top:2px}

/* ===== 工程重估 ===== */
.recost{height:100%;display:grid;grid-template-columns:330px 1fr;gap:14px;align-items:start}
.recost>div{display:flex;flex-direction:column;gap:14px;min-height:0}
.basket table{width:100%;border-collapse:collapse}
.basket th{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;text-align:right;font-weight:700;padding:0 0 5px}
.basket th:first-child{text-align:left}
.basket td{padding:6px 0;border-top:1px solid var(--line);font-size:13px;vertical-align:middle}
.basket td.r{text-align:right;font-variant-numeric:tabular-nums}
.basket .mm{display:flex;align-items:center;gap:7px;font-weight:600}
.basket input{width:98px;font:inherit;font-size:13px;text-align:right;font-variant-numeric:tabular-nums;border:1px solid var(--line);background:var(--sunken);color:var(--ink);border-radius:7px;padding:5px 8px}
.basket input:focus{outline:2px solid var(--accent);border-color:transparent}
.basket input::placeholder{color:var(--muted);opacity:.55}
.basket td.unit{color:var(--muted)}
.timeset{display:flex;gap:12px;margin-top:8px}
.timeset label{flex:1;display:flex;flex-direction:column;gap:5px;font-size:11.5px;color:var(--ink2)}
.timeset label span{font-weight:600;color:var(--ink)}
.timeset select{font:inherit;font-size:13px;border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:8px;padding:7px 8px;font-variant-numeric:tabular-nums}

.stat3{display:grid;grid-template-columns:1fr 1fr 1.15fr;gap:1px;background:var(--line);border-radius:var(--r);overflow:hidden;flex:none}
.st{background:var(--surface);padding:12px 15px;position:relative}
.st .l{font-size:11px;color:var(--muted);font-weight:600}
.st .v{font-size:23px;font-weight:740;letter-spacing:-.02em;margin-top:2px;font-variant-numeric:tabular-nums}
.st .s{font-size:11px;color:var(--ink2);margin-top:1px}
.st.hl{background:linear-gradient(120deg,var(--rise-soft),color-mix(in srgb,var(--rise-soft) 30%,var(--surface)))}
.st.hl .v{color:var(--rise)} .st.hlg{background:linear-gradient(120deg,var(--fall-soft),color-mix(in srgb,var(--fall-soft) 30%,var(--surface)))} .st.hlg .v{color:var(--fall)}
.st.diff{cursor:help}
.st.diff::after{content:"▾";position:absolute;top:8px;right:11px;font-size:10px;color:var(--muted)}

.reco{display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:var(--r);flex:none;
  background:linear-gradient(100deg,var(--accent-soft),color-mix(in srgb,var(--accent-soft) 30%,var(--surface)));
  border:1px solid color-mix(in srgb,var(--accent) 26%,var(--line))}
.reco .ic{width:38px;height:38px;flex:none;border-radius:10px;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:19px}
.reco .rv{margin-left:auto;text-align:right}
.reco .rv .n{font-size:24px;font-weight:750;color:var(--accent);letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.reco .rv .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.reco h4{font-size:13.5px;margin:0}
.reco p{margin:3px 0 0;font-size:12px;color:var(--ink2);max-width:56ch;line-height:1.5}
.trendcard{display:flex;flex-direction:column}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;height:100%;gap:4px}
.empty-ic{width:52px;height:52px;border-radius:15px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-size:28px;font-weight:300;margin-bottom:6px}
.empty h3{font-size:15px} .empty p{margin:2px 0 0;color:var(--ink2);font-size:12.5px;max-width:40ch;line-height:1.6}

/* 懸停工具提示（R-11 / R-12）— 位於 stage 內、隨畫布縮放 */
.richtip{position:absolute;z-index:50;background:var(--raised);border:1px solid var(--line);border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.28);padding:12px 14px;opacity:0;pointer-events:none;transition:opacity .12s}
.richtip.show{opacity:1}
.richtip .rt-title{font-size:11.5px;color:var(--ink2);margin-bottom:8px;max-width:400px}
.pie-wrap{display:flex;align-items:center;gap:18px}
.pie-legend{display:flex;flex-direction:column;gap:2px;min-width:230px}
.pie-legend .pl{display:grid;grid-template-columns:12px 1fr auto auto;align-items:center;gap:9px;padding:5px 0;border-top:1px solid var(--line);font-size:12.5px}
.pie-legend .pl:first-child{border-top:0}
.pie-legend .pl .sw{width:11px;height:11px;border-radius:3px}
.pie-legend .pl .pc{font-weight:750;font-variant-numeric:tabular-nums}
.pie-legend .pl .amt{color:var(--muted);font-size:11px;font-variant-numeric:tabular-nums;min-width:60px;text-align:right}
.chip-help{cursor:help}

/* ===== 品項深掘 ===== */
.detail{display:flex;flex-direction:column;gap:12px}
.detail-head{display:flex;gap:8px;flex-wrap:wrap;align-items:center;flex:none}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{font:inherit;font-size:12.5px;font-weight:600;border:1px solid var(--line);background:var(--surface);color:var(--ink2);padding:5px 12px;border-radius:20px;cursor:pointer}
.chip[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:#fff}
.detail-grid{display:grid;grid-template-columns:1fr;gap:12px}
.detail-grid .card{display:flex;flex-direction:column;min-height:0}
.mini{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border-radius:11px;overflow:hidden;margin-top:8px;flex:none}
.mini .m{background:var(--surface);padding:9px 12px}
.mini .m .l{font-size:10.5px;color:var(--muted)}
.mini .m .v{font-size:16px;font-weight:720;margin-top:2px;font-variant-numeric:tabular-nums}
.mini.l7{grid-template-columns:repeat(7,1fr)}
.mini .m .u{font-size:9.5px;color:var(--muted);font-weight:500}
.cta{font:inherit;display:block;width:100%;height:100%;border:0;background:var(--accent);color:#fff;font-size:13px;font-weight:700;cursor:pointer;padding:9px 14px;text-align:left}
.cta .s{display:block;font-size:10px;font-weight:500;opacity:.82;margin-top:2px}
.cta:hover{background:color-mix(in srgb,var(--accent) 88%,#000)}
.foot-note{color:var(--muted);font-size:11px;margin-top:8px;line-height:1.55;flex:none}
</style>

<div id="stage">
  <header>
    <div class="bar">
      <div class="brand">
        <div class="logo">物</div>
        <div><b>大宗物料物價風險戰情室</b><span>橋梁工程材料 · 監看漲勢 × 工程重估</span></div>
      </div>
      <nav id="tabs">
        <button aria-selected="true" data-tab="watch">物價戰情</button>
        <button aria-selected="false" data-tab="detail">品項深掘</button>
        <button aria-selected="false" data-tab="recost">工程重估</button>
      </nav>
      <div class="spacer"></div>
      <div class="asof">資料截至 <b id="asof">—</b><br>來源：工程會價格趨勢</div>
    </div>
  </header>

  <main>
    <!-- ===== 物價戰情 ===== -->
    <section class="panel on" id="watch">
      <div id="banner"></div>
      <div class="cards" id="pcards"></div>
      <div class="watch-bottom">
        <div class="card pad">
          <div class="chead"><div><h3>物料漲跌幅比較</h3><div class="sub" id="cmpSub"></div></div>
            <div class="chips" id="rangeChips">
              <button class="chip" data-r="12">近1年</button>
              <button class="chip" aria-pressed="true" data-r="36">近3年</button>
              <button class="chip" data-r="999">全期</button>
            </div>
          </div>
          <div class="legend" id="cmpLegend"></div>
          <div class="chartbox"><div id="cmpChart" style="flex:1"></div></div>
        </div>
        <div class="card pad">
          <div class="chead"><div><h3>誰在漲、誰在跌</h3><div class="sub">近一年變化（YoY）</div></div></div>
          <div class="chartbox"><div id="movers" style="flex:1"></div></div>
        </div>
      </div>
    </section>

    <!-- ===== 品項深掘 ===== -->
    <section class="panel" id="detail">
      <div class="detail">
        <div class="detail-head">
          <span class="eyebrow" style="margin-right:4px">選擇品項</span>
          <div class="chips" id="matChips"></div>
        </div>
        <div class="detail-grid">
          <div class="card pad">
            <div class="chead"><div><h3 id="dTitle">—</h3><div class="sub" id="dSub"></div></div>
              <div class="chips" id="dRange">
                <button class="chip" data-r="12">近1年</button>
                <button class="chip" data-r="36">近3年</button>
                <button class="chip" aria-pressed="true" data-r="999">全期</button>
              </div>
            </div>
            <div class="chartbox"><div id="dChart" style="flex:1"></div></div>
            <div class="mini l7" id="dLadder" style="margin-top:8px"></div>
            <div class="foot-note" id="dRegHint">移動滑鼠至走勢線上，可查看該月各區域單價</div>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== 工程重估 ===== -->
    <section class="panel" id="recost">
      <div class="recost">
        <!-- 左欄：用料清單 → 試算時間設定（R-14.2）-->
        <div>
          <div class="card pad" id="basketCard">
            <div class="eyebrow">用料清單</div>
            <div class="basket" id="basket" style="margin-top:9px"></div>
          </div>
          <div class="card pad">
            <div class="eyebrow">試算時間設定</div>
            <div class="timeset">
              <label><span>原始編列時間</span><select id="origDate"></select></label>
              <label><span>重估時間</span><select id="revalDate"></select></label>
            </div>
          </div>
        </div>
        <!-- 右欄：三欄統計 → 成本走勢 → 建議編列（R-14.1）-->
        <div>
          <div class="card empty pad" id="emptyState">
            <div class="empty-ic">＋</div>
            <h3>填入用料，開始試算</h3>
            <p>在左側「用料清單」輸入各材料的用量（噸／方），並設定原始編列與重估兩個時間點，即可算出材料成本差額與建議編列。</p>
          </div>
          <div id="results" style="display:none;flex-direction:column;gap:14px">
            <div class="stat3" id="stat3"></div>
            <div class="card pad trendcard">
              <div class="chead"><div><h3>同一份用料，成本如何隨物價變動</h3></div></div>
              <div class="chartbox"><div id="basketChart" style="flex:1"></div></div>
            </div>
            <div class="reco" id="reco"></div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- 懸停工具提示容器（R-11 / R-12）-->
  <div class="richtip" id="pieTip"></div>
  <div class="richtip" id="wfTip"></div>
</div>
<div class="tip" id="tip"></div>

function regionRatios(m){
  const reg=DATA.region[m]||{};const ord=["北","中","南","東"];const ks=ord.filter(k=>reg[k]!=null);
  if(ks.length===0)return null;
  const mean=ks.reduce((a,k)=>a+reg[k],0)/ks.length;const ratios={};ks.forEach(k=>ratios[k]=reg[k]/mean);
  return {ks,ratios};

  return `<div class="tsep"></div><div class="tsub">各區域單價</div>${rows}<div class="tnote">走勢線為各區算術平均 · 單位：${unit}</div>`;

  const full=S(curMat).length;const win=dRange>=999?full:Math.min(full,dRange+1);const seg=S(curMat).slice(-win);
  lineChart(document.getElementById("dChart"),{series:[{label:curMat,color:c,vfmt:v=>fmt(v)+" "+s.unit,pts:seg.map(p=>({p:p.p,y:p.v}))}],mode:"abs",yfmt:v=>fmt(v),w:1180,h:330,tipExtra:detailTipExtra});
  // 變化階梯：最新單價 + 近1月/3月/6月/1年/3年 + 試算 CTA
  const lastP=S(curMat)[S(curMat).length-1].p;
  const wins=[["近1月",1],["近3月",3],["近6月",6],["近1年",12],["近3年",36]];
  const cell=v=>`<div class="v" style="color:${v>0.15?"var(--rise)":v<-0.15?"var(--fall)":"var(--ink2)"}">${v>0?"+":""}${v.toFixed(1)}%</div>`;
  document.getElementById("dLadder").innerHTML=
    `<div class="m"><div class="l">最新單價 · ${rocLabel(lastP)}</div><div class="v">${fmt(s.latest)}<span class="u"> ${s.unit}</span></div></div>`+
    wins.map(([lb,k])=>`<div class="m"><div class="l">${lb}</div>${cell(chg(curMat,k))}</div>`).join("")+
    `<div class="m" style="padding:0"><button class="cta" id="dCta">試算工程成本 →<span class="s">前往「工程重估」</span></button></div>`;
  document.getElementById("dCta").onclick=()=>gotoTab("recost");
  document.getElementById("dRegHint").textContent=regionRatios(curMat)
    ?"移動滑鼠至走勢線上，可查看該月各區域單價"
    :"此品項為全國單一報價、無分區；移動滑鼠可查看各月單價";
}

/* ---------- 分頁 / 主題 / 縮放 ---------- */
const stage=document.getElementById("stage"),pieTip=document.getElementById("pieTip"),wfTip=document.getElementById("wfTip");
function gotoTab(t){
  document.querySelectorAll("#tabs button").forEach(x=>x.setAttribute("aria-selected",x.dataset.tab===t));
  document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("on",p.id===t));
  pieTip.classList.remove("show");wfTip.classList.remove("show");
}
document.querySelectorAll("#tabs button").forEach(b=>b.onclick=()=>gotoTab(b.dataset.tab));
document.getElementById("rangeChips").addEventListener("click",e=>{const b=e.target.closest("[data-r]");if(!b)return;
  cmpRange=+b.dataset.r;document.querySelectorAll("#rangeChips .chip").forEach(x=>x.setAttribute("aria-pressed",x===b));buildCompare();});
document.getElementById("dRange").addEventListener("click",e=>{const b=e.target.closest("[data-r]");if(!b)return;
  dRange=+b.dataset.r;document.querySelectorAll("#dRange .chip").forEach(x=>x.setAttribute("aria-pressed",x===b));renderDetail();});
function fit(){const s=Math.min(window.innerWidth/1280,window.innerHeight/720);window.__scale=s;stage.style.transform=`scale(${s})`;}
window.addEventListener("resize",fit);fit();
renderWatch();renderRecost();renderDetail();
</script>
